<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Bulk Invoice | ProWear Solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-light" data-page="contact">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="fa-solid fa-shirt me-2 text-primary"></i>ProWear Solutions</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="/">Home</a>
                <a class="nav-link text-white" href="/products">Products</a>
                <a class="nav-link text-white active fw-bold text-primary" href="/contact">Contact</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-0 shadow-sm p-4 p-md-5">
                    <h3 class="fw-bold text-uppercase mb-2">B2B Order Quote Request</h3>
                    <p class="text-muted small mb-4">Direct stream access to specialized corporate sizing configuration pipelines and custom logo printing processes.</p>
                    
                    <div id="statusAlert" class="alert d-none" role="alert"></div>

                    <form id="contactForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Name / Enterprise Entity</label>
                            <input type="text" class="form-control" id="name" required placeholder="JoyTech Management">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Corporate Contact Email</label>
                            <input type="email" class="form-control" id="email" required placeholder="procurement@joytech.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Specification Matrix Details</label>
                            <textarea class="form-control" id="message" rows="5" required placeholder="Provide design patterns, textile counts, size distributions, and delivery targets..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">Dispatch Inquiry Block</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-auto border-top border-secondary">
        <p class="small text-muted mb-0">© 2026 <strong>ProWear Solutions</strong>. All Rights Reserved.</p>
    </footer>

    <script src="/static/js/main.js"></script>
</body>
</html>
