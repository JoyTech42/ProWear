<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Catalog | ProWear Solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100" data-page="products">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="fa-solid fa-shirt me-2 text-primary"></i>ProWear Solutions
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#productsNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="productsNavbar">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link text-white me-3" href="/">Home</a>
                    <a class="nav-link text-white active fw-bold text-primary me-3" href="/products">Products</a>
                    <a class="nav-link text-white" href="/contact">Contact</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container my-5 flex-grow-1">
        <div class="row">
            
            <div class="col-lg-3 mb-4">
                <div class="card border-0 shadow-sm p-4 sticky-top" style="top: 90px; z-index: 10;">
                    <h5 class="fw-bold text-uppercase mb-3 d-flex align-items-center">
                        <i class="fa-solid fa-sliders text-primary me-2 small"></i>Filters
                    </h5>
                    
                    <div class="mb-3">
                        <label for="searchBar" class="form-label small fw-bold text-muted text-uppercase">Search Catalog</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-solid fa-magnifying-glass small"></i></span>
                            <input type="text" id="searchBar" class="form-control border-start-0 ps-0" placeholder="Search apparel...">
                        </div>
                    </div>
                    
                    <div>
                        <label for="categoryFilter" class="form-label small fw-bold text-muted text-uppercase">Category Selection</label>
                        <select id="categoryFilter" class="form-select bg-light border-0 fw-medium text-dark">
                            <option value="">All Categories</option>
                            <option value="Jerseys">Jerseys</option>
                            <option value="Polo Shirts">Polo Shirts</option>
                            <option value="Hoodies">Hoodies & Jackets</option>
                            <option value="Workwear">Workwear & Uniforms</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="col-lg-9">
                
                <div id="loadingSpinner" class="text-center py-5 bg-white rounded-3 shadow-sm mb-4">
                    <div class="spinner-border text-primary" role="status" style="width: 2.5rem; height: 2.5rem;"></div>
                    <p class="text-muted small mt-3 mb-0 fw-medium">Streaming inventory assets from Neon Cluster...</p>
                </div>
                
                <div id="productsGrid" class="row g-4 d-none">
                    </div>

                <div id="emptyState" class="text-center py-5 bg-white rounded-3 shadow-sm d-none">
                    <div class="mb-3">
                        <i class="fa-solid fa-box-open text-muted fa-3x"></i>
                    </div>
                    <h5 class="fw-bold text-dark mb-1">No Matching Items</h5>
                    <p class="text-muted small mb-0">No items tracked matching the specified filter criteria.</p>
                </div>
                
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-auto border-top border-secondary">
        <div class="container">
            <p class="small text-muted mb-0">© 2026 <strong>ProWear Solutions</strong>. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="/js/main.js"></script>
</body>
</html>
