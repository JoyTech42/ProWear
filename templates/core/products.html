<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Inventory Catalog | ProWear Solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-light" data-page="products">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="fa-solid fa-shirt me-2 text-primary"></i>ProWear Solutions</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="/">Home</a>
                <a class="nav-link text-white active fw-bold text-primary" href="/products">Products</a>
                <a class="nav-link text-white" href="/contact">Contact</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <!-- Filtering Selection Panel -->
            <div class="col-lg-3 mb-4">
                <div class="card border-0 shadow-sm p-4 sticky-filter shadow-sm">
                    <h5 class="fw-bold text-uppercase mb-3">Filters</h5>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Search Catalog</label>
                        <input type="text" id="searchBar" class="form-control" placeholder="Search items...">
                    </div>
                    <div>
                        <label class="form-label small fw-bold text-muted">Category Selection</label>
                        <select id="categoryFilter" class="form-select">
                            <option value="">All Categories</option>
                            <option value="Jerseys">Jerseys</option>
                            <option value="Polo Shirts">Polo Shirts</option>
                            <option value="Hoodies">Hoodies & Jackets</option>
                            <option value="Workwear">Workwear & Uniforms</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Dynamic Rendering Target Container Element View -->
            <div class="col-lg-9">
                <div id="loadingSpinner" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="text-muted small mt-2">Streaming inventory assets from Neon Cluster...</p>
                </div>
                
                <div id="productsGrid" class="row g-4 d-none"></div>

                <div id="emptyState" class="text-center py-5 d-none">
                    <i class="fa-solid fa-box-open text-muted fa-3x mb-3"></i>
                    <p class="text-muted small">No items tracked matching the specified filter criteria.</p>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-auto border-top border-secondary">
        <p class="small text-muted mb-0">© 2026 <strong>ProWear Solutions</strong>. All Rights Reserved.</p>
    </footer>

    <script src="/static/js/main.js"></script>
</body>
</html>
