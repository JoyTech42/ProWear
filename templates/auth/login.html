<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard Authorization Gateway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center min-vh-100" data-page="login">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4 text-white">
                    <h4 class="fw-bold text-uppercase"><i class="fa-solid fa-shield-halved text-primary me-2"></i>Authorization Secure Node</h4>
                    <p class="small text-muted">ProWear Solutions Corporate Dashboard Access</p>
                </div>
                
                <div class="card border-0 shadow-lg p-4 rounded-3 bg-white">
                    <form action="/auth/login" methods="POST">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-dark">Access Handle Account Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-muted border-end-0"><i class="fa-solid fa-user"></i></span>
                                <input type="text" name="username" class="form-control bg-light border-start-0" required placeholder="admin_handle">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-dark">Cryptographic Security Token Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-muted border-end-0"><i class="fa-solid fa-lock"></i></span>
                                <input type="password" name="password" class="form-control bg-light border-start-0" required placeholder="••••••••">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">Verify Node Authority</button>
                    </form>
                    <a href="/" class="btn btn-link btn-sm text-center d-block mt-3 text-muted decoration-none"><i class="fa-solid fa-arrow-left me-1"></i> Return to storefront public layer</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
